{% extends "base_or_navbar/navebar.html" %}{% block title %}Log in | AKTU Student Help{% endblock %}{% block content %}<div class="container py-5"><div class="row justify-content-center"><div class="col-md-7 col-lg-5"><div class="card p-4 p-md-5"><h1 class="h2 fw-bold">Welcome back</h1><p class="text-secondary mb-4">Log in to access your study dashboard.</p><form method="post" novalidate>{% csrf_token %}<input type="hidden" name="next" value="{{ request.GET.next }}"><div class="mb-3"><label class="form-label" for="username">Username</label><input class="form-control" id="username" name="username" autocomplete="username" required autofocus></div><div class="mb-3"><label class="form-label" for="password">Password</label><input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required></div><div class="d-flex justify-content-between align-items-center mb-4"><a href="{% url 'password_reset' %}" class="small">Forgot password?</a></div><button class="btn btn-brand w-100" type="submit">Log in</button></form><p class="text-center text-secondary small mt-4 mb-0">New here? <a href="{% url 'register' %}">Create an account</a></p></div></div></div></div>{% endblock %}
