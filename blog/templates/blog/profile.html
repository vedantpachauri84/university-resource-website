



<style>
body{
    background:#f4f7fc;
}

.profile-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
    padding:20px;
}

.profile-card{
    background:white;
    width:420px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    overflow:hidden;
    transition:0.3s;
}

.profile-card:hover{
    transform:translateY(-5px);
}

.profile-header{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    text-align:center;
    padding:35px 20px;
}

.profile-img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    margin-bottom:15px;
}

.profile-header h2{
    margin:10px 0 5px;
    font-size:28px;
}

.profile-header p{
    opacity:0.9;
    font-size:15px;
}

.upload-form{
    padding:30px;
}

.file-input{
    width:100%;
    padding:12px;
    border:2px dashed #cbd5e1;
    border-radius:10px;
    margin-bottom:20px;
    cursor:pointer;
}

.upload-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.upload-btn:hover{
    background:#4338ca;
}

.info-box{
    padding:20px 30px;
    border-top:1px solid #eee;
}

.info-box p{
    margin:10px 0;
    font-size:15px;
    color:#444;
}

.info-box strong{
    color:#111;
}
</style>

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-header">

            {% if profile.image %}
                <img src="{{ profile.image.url }}" class="profile-img">
            {% endif %}

            <h2>{{ request.user.username }}</h2>
            <p>{{ request.user.email }}</p>

        </div>

        <div class="info-box">
            <p><strong>Username:</strong> {{ request.user.username }}</p>
            <p><strong>Email:</strong> {{ request.user.email }}</p>
            <p><strong>Member:</strong> AKTU Student Help</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="upload-form">
            {% csrf_token %}

            <input type="file" name="image" class="file-input" required>

            <button type="submit" class="upload-btn">
                Upload New Profile Picture
            </button>
        </form>

    </div>

</div>
